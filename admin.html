<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAP - Qırmızı Admin Panel</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0a0000; color: #ff0000; padding: 30px; text-align: center; }
        .panel-box { border: 2px solid #ff0000; display: inline-block; padding: 30px; box-shadow: 0 0 20px #ff0000; background: #000; width: 100%; max-width: 420px; margin-top: 50px; border-radius: 5px; }
        h2 { text-shadow: 0 0 10px #ff0000; margin-bottom: 20px; }
        input, textarea, button { display: block; margin: 15px auto; padding: 12px; width: 100%; background: #000; border: 1px solid #ff0000; color: #ff3333; border-radius: 3px; outline: none; }
        input:focus, textarea:focus { box-shadow: 0 0 8px #ff0000; }
        button { background: #ff0000; color: #000; font-weight: bold; cursor: pointer; letter-spacing: 1px; transition: 0.3s; }
        button:hover { background: #990000; color: #fff; box-shadow: 0 0 10px #ff0000; }
        #adminContent { display: none; }
    </style>
</head>
<body>

<div id="loginForm" class="panel-box">
    <h2>[ ADMIN LOGIN ]</h2>
    <input type="password" id="adminPass" placeholder="Admin Şifrəsi">
    <button onclick="checkAdminPass()">GİRİŞ ET</button>
</div>

<div id="adminContent" class="panel-box">
    <h2>[ TAP - CENTRAL CONTROL ]</h2>
    <input type="text" id="targetName" placeholder="Ad Soyad">
    <input type="text" id="targetPhone" placeholder="Telefon Nömrəsi">
    <input type="text" id="targetCity" placeholder="Yaşadığı Yer">
    <input type="text" id="targetCar" placeholder="Maşını (Marka/Nömrə)">
    <textarea id="fakeResult" placeholder="Zarafat Qeydi və ya Məxfi Mətn..." rows="4"></textarea>
    <button onclick="saveToDatabase()">MƏLUMATI BAZAYA VUR</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    // ⚠️ BURA DA HƏMİN FIREBASE LINKINI QOYMALISAN
    const firebaseConfig = { databaseURL: "SƏNİN_FIREBASE_DATABASE_URL_UNVANIN" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function checkAdminPass() {
        if(document.getElementById('adminPass').value === "Orman511_Sakso") {
            document.getElementById('loginForm').style.display = "none";
            document.getElementById('adminContent').style.display = "block";
        } else { alert("YALNIŞ ŞİFRƏ!"); }
    }

    function saveToDatabase() {
        let name = document.getElementById('targetName').value.trim();
        let phone = document.getElementById('targetPhone').value.trim();
        let city = document.getElementById('targetCity').value.trim();
        let car = document.getElementById('targetCar').value.trim();
        let info = document.getElementById('fakeResult').value.trim();
        
        if(!name) return alert("Ad Soyad məcburidir!");

        let key = name.toLowerCase().replace(/\s+/g, '_');
        
        database.ref('targets/' + key).set({
            fullname: name, phone: phone || "Yoxdur", city: city || "Yoxdur", car: car || "Yoxdur", fake_info: info || "Məlumat yoxdur."
        }).then(() => {
            alert("Məlumat Qırmızı Bazaya Yazıldı!");
            document.getElementById('targetName').value = "";
            document.getElementById('targetPhone').value = "";
            document.getElementById('targetCity').value = "";
            document.getElementById('targetCar').value = "";
            document.getElementById('fakeResult').value = "";
        }).catch(err => {
            alert("Xəta baş verdi! Firebase URL-nin düzgün olduğundan və icazələrin açıq olduğundan əmin olun.");
        });
    }
</script>
</body>
</html>
