<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>TAP - Məxfi Axtarış Sistemi</title>
    <style>
        body { background-color: #050505; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; padding-top: 80px; }
        .box { border: 1px solid #00ff00; display: inline-block; padding: 30px; box-shadow: 0 0 15px #00ff00; background: #000; width: 450px; }
        input { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 12px; font-size: 16px; width: 80%; text-align: center; margin-bottom: 15px; }
        button { background: #00ff00; color: #000; border: none; padding: 12px 25px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #008800; color: #fff; }
        #siteContent, #loading, #result { display: none; }
        .critical { color: #ff0000; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; color: #fff; text-align: left; }
        th, td { padding: 10px; border: 1px solid #00ff00; }
        th { color: #00ff00; }
    </style>
</head>
<body>

<div id="authBox" class="box">
    <h2>[ SİSTEMƏ GİRİŞ ]</h2>
    <p>Bu sistemə daxil olmaq üçün xüsusi icazə kodu tələb olunur:</p>
    <input type="password" id="accessCode" placeholder="Məxfi Giriş Kodu">
    <br>
    <button onclick="verifyAccess()">SİSTEMİ AKTİVLƏŞDİR</button>
</div>

<div id="siteContent" class="box">
    <h2>[ TAP - DATA SEARCH ]</h2>
    <p>Axtarış etmək üçün şəxsin ad və soyadını dəqiq daxil edin:</p>
    <input type="text" id="searchName" placeholder="Məs: Elvin Məmmədov">
    <br>
    <button onclick="startScan()">BAZADA AXTAR</button>

    <div id="loading"></div>
    
    <div id="result"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "SƏNİN_FIREBASE_DATABASE_URL_UNVANIN" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Sayta giriş kodunun yoxlanması
    function verifyAccess() {
        let code = document.getElementById('accessCode').value.trim();
        if(code === "Sakso3169_LMNRAHH66") {
            document.getElementById('authBox').style.display = "none";
            document.getElementById('siteContent').style.display = "inline-block";
        } else {
            alert("KOD SƏHVDİR! Giriş rədd edildi.");
        }
    }

    function startScan() {
        let searchName = document.getElementById('searchName').value.trim();
        if(!searchName) return alert("Ad soyad daxil edin!");

        let loadingDiv = document.getElementById('loading');
        let resultDiv = document.getElementById('result');
        
        resultDiv.style.display = "none";
        loadingDiv.style.display = "block";

        let steps = [
            "Məxfi serverlərə sorğu göndərilir...",
            "Verilənlər bazası filtrlənir...",
            "Uyğunluq yoxlanılır..."
        ];

        let currentStep = 0;
        let interval = setInterval(() => {
            if(currentStep < steps.length) {
                loadingDiv.innerHTML = `[PROCESS] ${steps[currentStep]}`;
                currentStep++;
            } else {
                clearInterval(interval);
                loadingDiv.style.display = "none";
                fetchData(searchName);
            }
        }, 1200);
    }

    function fetchData(name) {
        let key = name.toLowerCase().replace(/\s+/g, '_');
        let resultDiv = document.getElementById('result');
        resultDiv.style.display = "block";

        database.ref('targets/' + key).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                let data = snapshot.val();
                
                // Məlumatlar tapıldıqda çıxacaq cədvəl forması
                resultDiv.innerHTML = `
                    <h3 class="critical">⚠️ FAAL DATA TAPILDI ⚠️</h3>
                    <table>
                        <tr><th>Parametr</th><th>Məlumat</th></tr>
                        <tr><td>Ad Soyad</td><td>${data.fullname}</td></tr>
                        <tr><td>Telefon</td><td>${data.phone}</td></tr>
                        <tr><td>Yaşayış Yeri</td><td>${data.city}</td></tr>
                        <tr><td>Nəqliyyat Vasiitəsi</td><td>${data.car}</td></tr>
                    </table>
                    <p style="margin-top:15px; color:#ff3333;"><b>Sistem Qeydi:</b> ${data.fake_info}</p>
                `;
            } else {
                // Əgər bazada yoxdursa bura girəcək (yalnız bazadan axtarsın dediyin üçün)
                resultDiv.innerHTML = `<h3 style="color: #ff0000;">❌ NETİCƏ TAPILMADI ❌</h3><p>Daxil edilən ad mərkəzi bazada mövcud deyil.</p>`;
            }
        });
    }
</script>
</body>
</html>
